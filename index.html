<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Trump Run Game</title>\n    <style>\n        body { margin: 0; overflow: hidden; }\n        #gameCanvas { background: lightblue; display: block; margin: auto; }\n        .player { width: 50px; height: 50px; background: orange; position: absolute; }\n        .enemy { width: 50px; height: 50px; background: red; position: absolute; }\n        .money { width: 30px; height: 30px; background: gold; position: absolute; }\n    </style>\n</head>\n<body>\n    <div class="player" id="player"></div>\n    <canvas id="gameCanvas" width="800" height="600"></canvas>\n    <script>\n        const player = document.getElementById('player');\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let posX = 100, posY = 100;\n        let moneyCollected = 0;\n        const enemies = [];\n\n        function createEnemy() {\n            const enemy = { x: 800, y: Math.random() * canvas.height };\n            enemies.push(enemy);\n        }\n\n        function draw() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            ctx.fillStyle = 'orange';\n            ctx.fillRect(posX, posY, 50, 50); // Player\n\n            enemies.forEach((enemy, index) => {\n                enemy.x -= 2; // Enemy movement\n                ctx.fillStyle = 'red';\n                ctx.fillRect(enemy.x, enemy.y, 50, 50);\n                if (enemy.x < 0) enemies.splice(index, 1);\n            });\n\n            // Display collected money\n            ctx.fillStyle = 'black';\n            ctx.font = '20px Arial';\n            ctx.fillText('Money: ' + moneyCollected, 10, 20);\n        }\n\n        function update() {\n            draw();\n            // AI Logic for enemies to walk and react\n            if (Math.random() < 0.02) createEnemy();\n            requestAnimationFrame(update);\n        }\n\n        window.addEventListener('keydown', (e) => {\n            if (e.key === 'ArrowUp' && posY > 0) posY -= 10;\n            if (e.key === 'ArrowDown' && posY < canvas.height - 50) posY += 10;\n            if (e.key === ' ') { // Simple shooting mechanic\n                console.log('Shoot!');\n            }\n        });\n\n        update();\n    </script>\n</body>\n</html>
