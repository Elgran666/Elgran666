<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trump Run Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #87ceeb;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    width: 50,
    height: 50,
    speed: 5,
    dx: 0
};

let enemies = [];
let money = 0;
let isShooting = false;
let bullets = [];

function createEnemies() {
    for (let i = 0; i < 5; i++) {
        enemies.push({
            x: Math.random() * canvas.width,
            y: Math.random() * (canvas.height - 100),
            width: 50,
            height: 50,
            speed: Math.random() * 2 + 1
        });
    }
}

function drawPlayer() {
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawEnemies() {
    ctx.fillStyle = 'red';
    enemies.forEach(enemy => {
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
    });
}

function drawBullets() {
    ctx.fillStyle = 'yellow';
    bullets.forEach(bullet => {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
    });
}

function drawMoney() {
    ctx.fillStyle = 'gold';
    ctx.font = '30px Arial';
    ctx.fillText(`Money: $${money}`, 10, 30);
}

function updatePlayer() {
    player.x += player.dx;

    // Keep player within canvas bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
}

function updateEnemies() {
    enemies.forEach(enemy => {
        enemy.x -= enemy.speed;
        if (enemy.x < -enemy.width) {
            enemy.x = canvas.width;
            money += 10; // collect money for each enemy that crosses
        }
    });
}

function updateBullets() {
    bullets.forEach((bullet, index) => {
        bullet.y -= bullet.speed;
        // Remove bullets that go off-screen
        if (bullet.y < 0) {
            bullets.splice(index, 1);
        }
    });
}

function shoot() {
    if (isShooting) {
        bullets.push({
            x: player.x + player.width / 2 - 5,
            y: player.y,
            width: 10,
            height: 10,
            speed: 10
        });
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    updatePlayer();
    drawPlayer();
    drawEnemies();
    updateEnemies();
    shoot();
    updateBullets();
    drawBullets();
    drawMoney();
    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowRight') player.dx = player.speed;
    if (e.code === 'ArrowLeft') player.dx = -player.speed;
    if (e.code === 'Space') isShooting = true;
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowRight' || e.code === 'ArrowLeft') player.dx = 0;
    if (e.code === 'Space') isShooting = false;
});

createEnemies();
gameLoop();
</script>
</body>
</html>
