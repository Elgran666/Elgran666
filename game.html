<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trump Run Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: #f0f0f0; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;

        let player = { x: 50, y: 300, width: 50, height: 50, speed: 5, color: 'blue' };
        let bullets = [];
        let enemies = [];

        function update() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Update bullets
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.speed;
                if (bullet.x > canvas.width) bullets.splice(index, 1);
                ctx.fillStyle = 'red';
                ctx.fillRect(bullet.x, bullet.y, 10, 5);
            });

            // Spawn and update enemies
            if (Math.random() < 0.02) {
                enemies.push({ x: canvas.width, y: Math.random() * (canvas.height - 50), width: 50, height: 50 });
            }
            enemies.forEach((enemy, index) => {
                enemy.x -= 2;
                if (enemy.x + enemy.width < 0) enemies.splice(index, 1);
                ctx.fillStyle = 'green';
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });

            requestAnimationFrame(update);
        }

        function shoot() {
            bullets.push({ x: player.x + player.width, y: player.y + 20, speed: 7 });
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && player.y > 0) player.y -= player.speed;
            if (e.key === 'ArrowDown' && player.y < canvas.height - player.height) player.y += player.speed;
            if (e.key === ' ') shoot();
        });

        update();
    </script>
</body>
</html>
